name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: linux
          target: desktop
          arch: gcc_64
          modules: qttools qtsvg
          cache: true
      - name: Build
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build
          test -x release/TheoQtHelper

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Disable Windows Python stub
        shell: pwsh
        run: |
          Remove-Item "$env:LOCALAPPDATA\Microsoft\WindowsApps\python.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:LOCALAPPDATA\Microsoft\WindowsApps\python3.exe" -Force -ErrorAction SilentlyContinue
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qttools qtsvg
          cache: true
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install Ninja
        run: choco install ninja -y
      - name: Build
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR"
          cmake --build build
          if (-not (Test-Path release\TheoQtHelper.exe)) { exit 1 }

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install qt ninja cmake
      - name: Build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)"
          cmake --build build
          test -x release/TheoQtHelper.app/Contents/MacOS/TheoQtHelper || test -x release/TheoQtHelper
