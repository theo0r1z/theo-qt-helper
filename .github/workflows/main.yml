name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build qt6-base-dev qt6-tools-dev libqt6help6 libqt6svg6-dev libqt6printsupport6
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          test -x release/TheoQtHelper

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          arch: win64_msvc2022_64
          modules: qthelp
          cache: true
      - run: choco install ninja -y
      - run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR"
          cmake --build build
      - shell: pwsh
        run: if (-not (Test-Path release\TheoQtHelper.exe)) { exit 1 }

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install qt@6 ninja cmake
      - run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"
          cmake --build build
          test -x release/TheoQtHelper.app/Contents/MacOS/TheoQtHelper || test -x release/TheoQtHelper
